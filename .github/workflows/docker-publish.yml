name: Build and Push to GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/shopizer-admin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Patch sass-loader (skip fibers)
        run: |
          sed -i 's/fibers = require.resolve("fibers");/\/\/ fibers disabled/' \
            node_modules/sass-loader/dist/utils.js

      - name: Install sass
        run: npm install sass --ignore-scripts --legacy-peer-deps

      - name: Build Angular app
        run: NODE_OPTIONS="--max-old-space-size=4096" ./node_modules/@angular/cli/bin/ng build --prod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
