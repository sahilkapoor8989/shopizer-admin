name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Patch sass-loader (skip fibers)
        run: |
          sed -i 's/fibers = require.resolve("fibers");/\/\/ fibers disabled/' \
            node_modules/sass-loader/dist/utils.js

      - name: Install compatible packages
        run: npm install sass angular-file@3.3.0 @types/jquery@3.5.5 @types/minimatch@3.0.5 --legacy-peer-deps --ignore-scripts

      - name: Build
        run: NODE_OPTIONS="--max-old-space-size=4096" npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopizer-admin:latest
            ghcr.io/${{ github.repository_owner }}/shopizer-admin:${{ github.sha }}

      - name: Trigger frontend rebuild in shopizer-infra
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.INFRA_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/rishabhgupta9695/shopizer-infra/actions/workflows/build-frontend.yml/dispatches \
            -d '{"ref":"main"}'
